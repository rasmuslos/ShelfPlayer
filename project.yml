name: ShelfPlayer
options:
  bundleIdPrefix: io.rfk
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultSourceDirectoryType: syncedFolder

configFiles:
  Debug: Configuration/Debug.xcconfig
  Release: Configuration/Release.xcconfig

settings:
  base:
    MARKETING_VERSION: "3.2.2"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N8AA4S3S96
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_MODULE_VERIFIER: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_APPROACHABLE_CONCURRENCY: NO

packages:
  RFKit:
    url: https://git.sr.ht/~rasmuslos/RFKit
    branch: main
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.6"
  socket.io-client-swift:
    url: https://github.com/socketio/socket.io-client-swift
    branch: master

schemes:
  ShelfPlayer:
    build:
      targets:
        ShelfPlayer: all
        ShelfPlayerWidgets: all
        ShelfPlayerKitTests: [test]
        ShelfPlaybackTests: [test]
        ShelfPlayerUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShelfPlayerKitTests
        - ShelfPlaybackTests
        - ShelfPlayerUITests
      coverageTargets:
        - ShelfPlayerKit
        - ShelfPlayback
    archive:
      config: Release
  ShelfPlayerWidgets:
    build:
      targets:
        ShelfPlayerWidgets: all
    run:
      config: Debug

targets:
  ShelfPlayerKit:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayerKit
    dependencies:
      - package: RFKit
        product: RFKit
      - package: SwiftSoup
      - package: socket.io-client-swift
        product: SocketIO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.kit
        PRODUCT_NAME: ShelfPlayerKit
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: ShelfPlayerKit/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayback:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayback
    dependencies:
      - target: ShelfPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.playback
        PRODUCT_NAME: ShelfPlayback
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: ShelfPlayback/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayerMigration:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayerMigration
    dependencies:
      - target: ShelfPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.migration
        PRODUCT_NAME: ShelfPlayerMigration
        DEFINES_MODULE: true
        SWIFT_VERSION: "6.0"
    info:
      path: ShelfPlayerMigration/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayer:
    type: application
    platform: iOS
    sources:
      - App
      - path: AppIcons
        buildPhase: resources
    dependencies:
      - target: ShelfPlayerKit
      - target: ShelfPlayback
      - target: ShelfPlayerMigration
      - target: ShelfPlayerWidgets
    postBuildScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$BUILT_PRODUCTS_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}
        CODE_SIGN_ENTITLEMENTS: App/$(ENTITLEMENT_BASE).entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ShelfPlayer
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: ShelfPlayer Development
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ShelfPlayer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX).$(BUNDLE_ID_SUFFIX)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlayDelegate
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeSearch
            UIApplicationShortcutItemSubtitle: quickAction.search.subtitle
            UIApplicationShortcutItemTitle: quickAction.search
            UIApplicationShortcutItemType: search
        UIBackgroundModes:
          - audio
          - fetch
          - processing
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - io.rfk.shelfPlayer.spotlightIndex
          - io.rfk.shelfPlayer.convenienceDownload
        CADisableMinimumFrameDurationOnPhone: true
        CoreSpotlightContinuation: true
        CFBundleURLTypes:
          - CFBundleTypeRole: None
            CFBundleURLName: io.rfk.shelfplayer
            CFBundleURLSchemes:
              - shelfplayer
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsUsageDescription:
            NSATSExceptionThirdPartyServiceConnectionUsage: {}
        NSMicrophoneUsageDescription: ShelfPlayer does not use the microphone
        NSSiriUsageDescription: Use Siri to control playback, create bookmarks, and more.
        NSUserActivityTypes:
          - io.rfk.shelfPlayer.item
        INAlternativeAppNames:
          - INAlternativeAppName: Shelf Player
            INAlternativeAppNamePronunciationHint: shelfplayer
        INIntentsSupported:
          - INPlayMediaIntent
        INSupportedMediaCategories:
          - INMediaCategoryAudiobooks
          - INMediaCategoryPodcasts
        ITSAppUsesNonExemptEncryption: false
        UTExportedTypeDeclarations:
          - UTTypeConformsTo:
              - ""
            UTTypeDescription: uti.item
            UTTypeIconFiles: []
            UTTypeIdentifier: io.rfk.shelfPlayer.item
            UTTypeTagSpecification: {}

  ShelfPlayerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - WidgetExtension
    dependencies:
      - target: ShelfPlayerKit
    postBuildScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$BUILT_PRODUCTS_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}.Widgets
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/$(ENTITLEMENT_BASE).entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: ShelfPlayer Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX).$(BUNDLE_ID_SUFFIX)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  ShelfPlayerKitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ShelfPlayerKitTests
    dependencies:
      - target: ShelfPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}.KitTests
        GENERATE_INFOPLIST_FILE: YES

  ShelfPlaybackTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - ShelfPlaybackTests
    dependencies:
      - target: ShelfPlayback
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}.PlaybackTests
        GENERATE_INFOPLIST_FILE: YES

  ShelfPlayerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - ShelfPlayerUITests
    dependencies:
      - target: ShelfPlayer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}.UITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: ShelfPlayer
        DONT_EMBED_APP_EXTENSIONS: YES
        # Xcode disables Swift Testing for UI test bundles by default by
        # aliasing the `Testing` module to a non-existent one. Clear the
        # alias so `import Testing` resolves to the real framework.
        TESTING_FRAMEWORK_MODULE_ALIAS_FLAGS: ""
