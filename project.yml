name: ShelfPlayer
options:
  bundleIdPrefix: io.rfk
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  defaultSourceDirectoryType: syncedFolder

configFiles:
  Debug: Configuration/Debug.xcconfig
  Release: Configuration/Release.xcconfig

settings:
  base:
    MARKETING_VERSION: "3.2.2"
    CURRENT_PROJECT_VERSION: 1
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N8AA4S3S96
    ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_MODULE_VERIFIER: YES
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  RFKit:
    url: https://git.sr.ht/~rasmuslos/RFKit
    branch: main
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.6"
  socket.io-client-swift:
    url: https://github.com/socketio/socket.io-client-swift
    branch: master

schemes:
  ShelfPlayer:
    build:
      targets:
        ShelfPlayer: all
        ShelfPlayerWidgets: all
    run:
      config: Debug
    archive:
      config: Release
  ShelfPlayerWidgets:
    build:
      targets:
        ShelfPlayerWidgets: all
    run:
      config: Debug

targets:
  ShelfPlayerKit:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayerKit
    dependencies:
      - package: RFKit
        product: RFKit
      - package: SwiftSoup
      - package: socket.io-client-swift
        product: SocketIO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.kit
        PRODUCT_NAME: ShelfPlayerKit
        DEFINES_MODULE: true
    info:
      path: ShelfPlayerKit/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayback:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayback
    dependencies:
      - target: ShelfPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.playback
        PRODUCT_NAME: ShelfPlayback
        DEFINES_MODULE: true
    info:
      path: ShelfPlayback/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayerMigration:
    type: framework
    platform: iOS
    sources:
      - ShelfPlayerMigration
    dependencies:
      - target: ShelfPlayerKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rfk.shelfplayer.migration
        PRODUCT_NAME: ShelfPlayerMigration
        DEFINES_MODULE: true
    info:
      path: ShelfPlayerMigration/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  ShelfPlayer:
    type: application
    platform: iOS
    sources:
      - App
      - path: AppIcons
        buildPhase: resources
    dependencies:
      - target: ShelfPlayerKit
      - target: ShelfPlayback
      - target: ShelfPlayerMigration
      - target: ShelfPlayerWidgets
    postCompileScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$TARGET_BUILD_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}
        CODE_SIGN_ENTITLEMENTS: App/$(ENTITLEMENT_BASE).entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ShelfPlayer
      configs:
        Debug:
          ASSETCATALOG_COMPILER_APPICON_NAME: ShelfPlayer Development
          SWIFT_STRICT_CONCURRENCY: targeted
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: ShelfPlayer
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX).$(BUNDLE_ID_SUFFIX)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneConfigurationName: CarPlay Configuration
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).CarPlayDelegate
        UIBackgroundModes:
          - audio
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - io.rfk.shelfPlayer.spotlightIndex
          - io.rfk.shelfPlayer.convenienceDownload
        NSMicrophoneUsageDescription: ShelfPlayer does not use the microphone
        NSSiriUsageDescription: Use Siri to control playback, create bookmarks, and more.

  ShelfPlayerWidgets:
    type: app-extension
    platform: iOS
    sources:
      - WidgetExtension
    dependencies:
      - target: ShelfPlayerKit
    postCompileScripts:
      - name: Set build number from git commit count
        script: |
          BUILD_NUMBER=$(git -C "$SRCROOT" rev-list --count HEAD)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$TARGET_BUILD_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_ID_PREFIX}.${BUNDLE_ID_SUFFIX}.Widgets
        CODE_SIGN_ENTITLEMENTS: WidgetExtension/$(ENTITLEMENT_BASE).entitlements
    info:
      path: WidgetExtension/Info.plist
      properties:
        CFBundleDisplayName: ShelfPlayer Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        AppGroupIdentifier: "group.$(BUNDLE_ID_PREFIX).$(BUNDLE_ID_SUFFIX)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
